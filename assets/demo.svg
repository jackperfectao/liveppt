    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#36D7B7"/>
      <stop offset="1" stop-color="#5F9BFF"/>
    </linearGradient>
    <filter id="soft" x="0" y="0" width="1280" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

