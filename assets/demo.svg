<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LivePPT demo preview">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1240" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1428"/>
      <stop offset="1" stop-color="#1A2342"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="130" x2="980" y2="520" gradientUnits="userSpaceOnUse">
